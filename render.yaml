# Render Blueprint — https://render.com/docs/blueprint-spec
# Everything runs on Render: a Docker PHP web service + a managed PostgreSQL DB.
# The DB credentials are wired automatically via `fromDatabase`, so you don't set
# any DB env var by hand.
services:
  - type: web
    name: freshcery
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: DB_DRIVER
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: freshcery-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: freshcery-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: freshcery-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: freshcery-db
          property: user
      - key: DB_PASS
        fromDatabase:
          name: freshcery-db
          property: password
      # APP_URL optional: unset -> app uses Render's RENDER_EXTERNAL_URL.
      - key: APP_URL
        sync: false

databases:
  - name: freshcery-db
    plan: free
    databaseName: freshcery
    user: freshcery
